name: daily-brief

# 휴면 대안: 활성 트리거는 Windows 작업 스케줄러(docs/SCHEDULING.md). PC-off가 잦아지면 활성화.
# 활성화 절차: ① repo Secrets 에 ANTHROPIC_API_KEY·TELEGRAM_BOT_TOKEN·TELEGRAM_CHAT_ID 등록
#            ② 아래 schedule 2줄 주석 해제 (21:00 UTC = 06:00 KST 익일, cron은 best-effort).
# 주의: secret 없이 schedule 켜면 매일 실패·알림 메일 → 반드시 secret 먼저.
on:
  # schedule:
  #   - cron: "0 21 * * *"
  workflow_dispatch: {} # 수동 트리거 (secret 등록돼 있어야 송신까지 동작)

concurrency:
  group: daily-brief
  cancel-in-progress: false

permissions:
  contents: write # state/sent.json dedup 상태 커밋 백 (러너 일회성)

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # 프로젝트 deps에는 추가하지 않음 — CI 러너에만 전역 설치 (CLAUDE.md 의존성 규칙 비위배).
      - name: Install Claude Code CLI
        run: npm i -g @anthropic-ai/claude-code

      # collect 실패 → news 없음 → brief exit 1 → daily 미실행(쓰레기 송신 방지). set -e로 의도된 체인.
      - name: collect → brief → daily
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -e
          npm run collect
          npm run brief
          npm run daily

      # daily가 markSent 했을 때만 sent.json 변경됨 → 변경 시에만 커밋(날짜만 담겨 public repo여도 무해).
      - name: persist dedup state
        if: always()
        run: |
          if [ -n "$(git status --porcelain state/sent.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/sent.json
            git commit -m "chore(state): mark sent via GHA [skip ci]"
            git push
          else
            echo "sent.json unchanged — nothing to persist"
          fi
